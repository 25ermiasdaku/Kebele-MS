version: '3.8'
services:
  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: kebele_db
    ports: ["3306:3306"]
    volumes: ["./database/schema.sql:/docker-entrypoint-initdb.d/1.sql", "mysql_data:/var/lib/mysql"]
  backend:
    build: ./backend
    ports: ["8000:8000"]
    depends_on: [mysql]
    environment:
      DB_HOST: mysql
      DB_NAME: kebele_db
      DB_USER: root
      DB_PASSWORD: rootpass
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [backend]
volumes:
  mysql_data:
